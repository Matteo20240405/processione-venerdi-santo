<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processione Venerdì Santo Savona - VVF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, updateDoc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const MY_API_KEY = "AIzaSyBEfowaPh1GL3Rn4mgHTtvVA1mTac1y1JA";

        try {
            const firebaseConfig = {
                apiKey: MY_API_KEY, 
                authDomain: "processione-venerdi-santo.firebaseapp.com",
                projectId: "processione-venerdi-santo",
                storageBucket: "processione-venerdi-santo.firebasestorage.app",
                messagingSenderId: "236869792869",
                appId: "1:236869792869:web:22fe40a476af9d3530c28c"
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = "venerdi-santo-2026";

            window.fb = { 
                auth, db, appId, 
                collection, addDoc, onSnapshot, doc, setDoc, updateDoc, deleteDoc, arrayUnion, 
                signInAnonymously, onAuthStateChanged,
                isLoaded: true,
                hasValidKey: true
            };
        } catch (error) {
            console.error("Errore inizializzazione Firebase:", error);
            window.fbError = error.message;
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f4; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d97706; border-radius: 10px; }
        .modal-zoom { animation: zoomIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const compressImage = (file, maxWidth = 1600, quality = 0.7) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = (maxWidth / width) * height;
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                };
            });
        };

        const Countdown = ({ targetDate }) => {
            const [timeLeft, setTimeLeft] = useState({ giorni: 0, ore: 0, minuti: 0, secondi: 0 });
            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = targetDate.getTime() - now;
                    if (distance < 0) {
                        clearInterval(timer);
                    } else {
                        setTimeLeft({
                            giorni: Math.floor(distance / (1000 * 60 * 60 * 24)),
                            ore: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                            minuti: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                            secondi: Math.floor((distance % (1000 * 60)) / 1000)
                        });
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [targetDate]);

            return (
                <div className="flex justify-center gap-2 my-6">
                    {Object.entries(timeLeft).map(([label, value]) => (
                        <div key={label} className="flex flex-col items-center bg-stone-800 text-amber-500 p-2 rounded-lg w-16 shadow-lg border border-amber-900/20">
                            <span className="text-xl font-black">{value}</span>
                            <span className="text-[8px] uppercase tracking-widest text-stone-400">{label}</span>
                        </div>
                    ))}
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home');
            const [news, setNews] = useState([]);
            const [participants, setParticipants] = useState([]);
            const [gallery, setGallery] = useState([]);
            const [cassaImage, setCassaImage] = useState("https://www.processione.savona.it/images/casse/18.jpg");
            const [isRegistered, setIsRegistered] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [loading, setLoading] = useState(false);
            const [uploadProgress, setUploadProgress] = useState({ current: 0, total: 0 });
            const [newsText, setNewsText] = useState('');
            const [isFbReady, setIsFbReady] = useState(false);
            const [showParticipantsList, setShowParticipantsList] = useState(false);
            const [selectedImage, setSelectedImage] = useState(null);
            
            const fileInputRef = useRef(null);
            const EVENT_DATE = new Date("2026-04-03T20:00:00");

            useEffect(() => {
                const checkFb = setInterval(() => {
                    if (window.fb && window.fb.isLoaded) {
                        setIsFbReady(true);
                        clearInterval(checkFb);
                    }
                }, 100);
                return () => clearInterval(checkFb);
            }, []);

            useEffect(() => {
                if (!isFbReady) return;
                const { fb } = window;
                fb.signInAnonymously(fb.auth).catch(() => {});
                const unsubscribe = fb.onAuthStateChanged(fb.auth, (u) => setUser(u));
                return () => unsubscribe();
            }, [isFbReady]);

            useEffect(() => {
                if (!user || !isFbReady) return;
                const { fb } = window;
                const newsRef = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'news');
                const partsRef = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'participants');
                const galleryRef = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'gallery');
                const cassaRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'settings', 'cassa');

                const u1 = fb.onSnapshot(newsRef, s => setNews(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0))));
                const u2 = fb.onSnapshot(partsRef, s => {
                    const ps = s.docs.map(d => d.data());
                    setParticipants(ps);
                    setIsRegistered(ps.some(p => p.userId === user.uid));
                });
                const u3 = fb.onSnapshot(galleryRef, s => setGallery(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0))));
                const u4 = fb.onSnapshot(cassaRef, d => {
                    if (d.exists() && d.data().url) setCassaImage(d.data().url);
                });

                return () => { u1(); u2(); u3(); u4(); };
            }, [user, isFbReady]);

            const handleGalleryUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0 || !isRegistered) return;
                const { fb } = window;
                setLoading(true);
                setUploadProgress({ current: 0, total: files.length });

                try {
                    for (let i = 0; i < files.length; i++) {
                        setUploadProgress(prev => ({ ...prev, current: i + 1 }));
                        const compressedBase64 = await compressImage(files[i], 1600, 0.7);
                        await fb.addDoc(fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'gallery'), {
                            url: compressedBase64,
                            userId: user.uid,
                            timestamp: Date.now()
                        });
                    }
                } catch(e) { console.error(e); }
                setLoading(false);
                setUploadProgress({ current: 0, total: 0 });
            };

            const register = async (e) => {
                e.preventDefault();
                const nome = e.target.nome.value;
                const { fb } = window;
                setLoading(true);
                try {
                    await fb.addDoc(fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'participants'), {
                        nomeCognome: nome, ruolo: 'VVF', userId: user.uid, timestamp: Date.now()
                    });
                    setView('home');
                } catch(e) { alert("Errore"); }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-stone-900 text-white p-4 sticky top-0 z-50 shadow-xl border-b border-amber-900/30">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <h1 className="text-lg font-serif font-bold text-amber-500 uppercase tracking-tighter">Processione VVF</h1>
                            <div className="flex gap-4 text-[10px] font-bold uppercase tracking-widest">
                                <button onClick={() => setView('home')} className={view === 'home' ? 'text-amber-400' : 'text-stone-400'}>Home</button>
                                <button onClick={() => setView('iscrizione')} className={view === 'iscrizione' ? 'text-amber-400' : 'text-stone-400'}>Iscrizione</button>
                                <button onClick={() => setView('galleria')} className={view === 'galleria' ? 'text-amber-400' : 'text-stone-400'}>Galleria</button>
                                <button onClick={() => setView('news')} className={view === 'news' ? 'text-amber-400' : 'text-stone-400'}>News</button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto p-4 w-full flex-grow animate-fade-in">
                        {view === 'home' && (
                            <div className="text-center">
                                <div className="relative h-64 md:h-96 rounded-[2rem] overflow-hidden shadow-2xl mb-6 bg-stone-800">
                                    <img src={cassaImage} className="w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent flex flex-col justify-end p-8 text-left">
                                        <h2 className="text-3xl md:text-5xl font-serif text-white uppercase">L'Orazione nell'orto</h2>
                                        <p className="text-amber-500 font-bold italic">Cassa dei Vigili del Fuoco</p>
                                    </div>
                                </div>
                                <Countdown targetDate={EVENT_DATE} />
                                <div className="grid md:grid-cols-2 gap-4 mt-8 text-left">
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border-l-4 border-amber-600">
                                        <h3 className="font-serif text-xl mb-1 text-stone-800">Evento</h3>
                                        <p className="text-stone-500 text-xs uppercase font-bold">03 Aprile 2026 - Ore 20:00</p>
                                    </div>
                                    <div className="bg-stone-900 p-6 rounded-3xl shadow-xl text-white">
                                        <h3 className="font-serif text-xl text-amber-500 mb-2">Squadra Portatori</h3>
                                        <button onClick={() => setShowParticipantsList(!showParticipantsList)} className="text-[10px] uppercase font-bold text-stone-400 border border-stone-700 px-4 py-2 rounded-lg">
                                            {showParticipantsList ? 'Chiudi lista' : `Visualizza iscritti (${participants.length})`}
                                        </button>
                                        {showParticipantsList && (
                                            <div className="mt-4 max-h-32 overflow-y-auto custom-scrollbar">
                                                {participants.map((p, i) => <div key={i} className="text-xs py-1 border-b border-stone-800 text-stone-300 italic">{p.nomeCognome}</div>)}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'iscrizione' && (
                            <div className="max-w-md mx-auto bg-white p-8 rounded-[2rem] shadow-2xl mt-10">
                                {isRegistered ? (
                                    <div className="text-center">
                                        <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">✓</div>
                                        <h2 className="text-2xl font-serif mb-2">Sei Iscritto</h2>
                                        <button onClick={() => setView('home')} className="w-full bg-stone-900 text-amber-500 py-3 rounded-xl font-bold uppercase mt-4">Home</button>
                                    </div>
                                ) : (
                                    <form onSubmit={register} className="space-y-4">
                                        <h2 className="text-2xl font-serif text-center">Registrazione VVF</h2>
                                        <input name="nome" type="text" placeholder="Nome e Cognome" required className="w-full p-4 bg-stone-100 rounded-xl outline-none" />
                                        <button type="submit" disabled={loading} className="w-full bg-stone-900 text-amber-500 py-4 rounded-xl font-black uppercase">
                                            {loading ? 'Caricamento...' : 'Conferma'}
                                        </button>
                                    </form>
                                )}
                            </div>
                        )}

                        {view === 'galleria' && (
                            <div className="space-y-8">
                                <h2 className="text-3xl font-serif text-center">Galleria Foto</h2>
                                {isRegistered ? (
                                    <div className="bg-white p-6 rounded-3xl border-2 border-dashed border-stone-200 text-center max-w-sm mx-auto">
                                        <label className="cursor-pointer">
                                            <div className="text-amber-700 font-bold text-xs uppercase">Seleziona e carica più foto</div>
                                            <input type="file" multiple accept="image/*" onChange={handleGalleryUpload} className="hidden" />
                                        </label>
                                        {loading && (
                                            <div className="mt-4">
                                                <div className="h-1 w-full bg-stone-100 rounded-full"><div className="h-full bg-amber-600 transition-all" style={{width: `${(uploadProgress.current/uploadProgress.total)*100}%`}}></div></div>
                                                <p className="text-[10px] mt-1 uppercase">{uploadProgress.current}/{uploadProgress.total}</p>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <p className="text-center text-xs text-stone-500 italic">Iscriviti per caricare le foto.</p>
                                )}
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                    {gallery.map(img => (
                                        <div key={img.id} onClick={() => setSelectedImage(img.url)} className="aspect-square rounded-2xl overflow-hidden shadow-md cursor-pointer hover:scale-105 transition-transform">
                                            <img src={img.url} className="w-full h-full object-cover" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'news' && (
                            <div className="max-w-2xl mx-auto space-y-6">
                                <h2 className="text-3xl font-serif text-center">Bacheca Notizie</h2>
                                {news.map(n => (
                                    <div key={n.id} className="bg-white p-6 rounded-3xl shadow-sm border-l-4 border-amber-600">
                                        <div className="flex justify-between text-[10px] font-bold text-stone-400 mb-2 uppercase">
                                            <span>{n.author}</span>
                                            <span>{new Date(n.timestamp).toLocaleDateString()}</span>
                                        </div>
                                        <p className="text-stone-700 text-sm">{n.text}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {selectedImage && (
                        <div className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-4" onClick={() => setSelectedImage(null)}>
                            <button className="absolute top-6 right-6 text-white text-3xl">&times;</button>
                            <img src={selectedImage} className="max-w-full max-h-[90vh] object-contain modal-zoom" />
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
