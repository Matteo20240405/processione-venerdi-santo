<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processione VVF Savona</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // CONFIGURAZIONE CON LA TUA CHIAVE API
        const firebaseConfig = {
            apiKey: "AIzaSyBEfowaPh1GL3Rn4mgHTtvVA1mTac1y1JA", 
            authDomain: "processione-venerdi-santo.firebaseapp.com",
            projectId: "processione-venerdi-santo",
            storageBucket: "processione-venerdi-santo.firebasestorage.app",
            messagingSenderId: "236869792869",
            appId: "1:236869792869:web:22fe40a476af9d3530c28c"
        };

        try {
            const app = initializeApp(firebaseConfig);
            window.fb = { 
                auth: getAuth(app), 
                db: getFirestore(app), 
                appId: "venerdi-santo-2026",
                collection, addDoc, onSnapshot, doc, setDoc, signInAnonymously, onAuthStateChanged,
                isLoaded: true 
            };
        } catch (e) { 
            console.error("Errore Firebase:", e); 
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f4; }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('home');
            const [user, setUser] = useState(null);
            const [ready, setReady] = useState(false);
            const [nome, setNome] = useState('');
            const [isRegistered, setIsRegistered] = useState(false);

            useEffect(() => {
                const checkFb = setInterval(() => {
                    if (window.fb && window.fb.isLoaded) {
                        setReady(true);
                        window.fb.onAuthStateChanged(window.fb.auth, u => {
                            setUser(u);
                        });
                        window.fb.signInAnonymously(window.fb.auth);
                        clearInterval(checkFb);
                    }
                }, 500);
                return () => clearInterval(checkFb);
            }, []);

            const handleIscrizione = (e) => {
                e.preventDefault();
                if(nome.trim().length > 3) {
                    setIsRegistered(true);
                    alert("Iscrizione completata con successo!");
                    setView('home');
                }
            };

            if (!ready) return (
                <div className="flex h-screen items-center justify-center bg-stone-900 text-amber-500 font-bold uppercase tracking-widest">
                    Caricamento Sistema VVF...
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    {/* NAVIGAZIONE */}
                    <nav className="bg-stone-950 text-white p-4 shadow-2xl border-b border-amber-900/50 sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <h1 className="text-lg font-serif font-bold text-amber-500 uppercase tracking-tighter">VVF Savona</h1>
                            <div className="flex gap-4 text-[10px] font-bold uppercase tracking-widest">
                                <button onClick={() => setView('home')} className={view === 'home' ? 'text-amber-400' : 'text-stone-400'}>Home</button>
                                <button onClick={() => setView('iscrizione')} className={view === 'iscrizione' ? 'text-amber-400' : 'text-stone-400'}>Iscrizione</button>
                                <button onClick={() => setView('galleria')} className={view === 'galleria' ? 'text-amber-400' : 'text-stone-400'}>Galleria</button>
                            </div>
                        </div>
                    </nav>

                    {/* CONTENUTO */}
                    <main className="max-w-4xl mx-auto p-4 w-full flex-grow">
                        {view === 'home' && (
                            <div className="text-center animate-fade-in">
                                <div className="relative h-64 md:h-96 rounded-[2rem] overflow-hidden shadow-2xl mb-6 bg-stone-800">
                                    <img src="https://www.processione.savona.it/images/casse/18.jpg" className="w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent flex flex-col justify-end p-8 text-left">
                                        <h2 className="text-3xl font-serif text-white uppercase">L'Orazione nell'orto</h2>
                                        <p className="text-amber-500 font-bold italic">Squadra Vigili del Fuoco</p>
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-3xl shadow-lg border-l-8 border-red-700 text-left">
                                    <h3 className="text-xl font-bold text-stone-800">Venerdì Santo 2026</h3>
                                    <p className="text-stone-500 text-sm">Savona, Ore 20:00</p>
                                    {!isRegistered && (
                                        <button onClick={() => setView('iscrizione')} className="mt-4 bg-stone-900 text-amber-500 px-6 py-2 rounded-xl text-xs font-bold uppercase">Iscriviti alla squadra</button>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'iscrizione' && (
                            <div className="max-w-md mx-auto bg-white p-8 rounded-[2rem] shadow-2xl mt-10">
                                <h2 className="text-2xl font-serif text-center mb-6">Registro Portatori</h2>
                                {isRegistered ? (
                                    <div className="text-center py-4">
                                        <p className="text-green-600 font-bold mb-4">Sei già registrato nella squadra!</p>
                                        <button onClick={() => setView('home')} className="w-full bg-stone-900 text-white py-3 rounded-xl font-bold uppercase">Torna alla Home</button>
                                    </div>
                                ) : (
                                    <form onSubmit={handleIscrizione} className="space-y-4">
                                        <input 
                                            type="text" 
                                            placeholder="Nome e Cognome" 
                                            className="w-full p-4 bg-stone-100 rounded-xl outline-none border-2 border-transparent focus:border-amber-500"
                                            value={nome}
                                            onChange={(e) => setNome(e.target.value)}
                                            required
                                        />
                                        <button type="submit" className="w-full bg-stone-900 text-amber-500 py-4 rounded-xl font-black uppercase tracking-widest shadow-xl">
                                            Conferma Iscrizione
                                        </button>
                                    </form>
                                )}
                            </div>
                        )}

                        {view === 'galleria' && (
                            <div className="space-y-8 text-center">
                                <h2 className="text-3xl font-serif">Galleria Foto</h2>
                                {isRegistered ? (
                                    <div className="bg-amber-50 p-8 rounded-3xl border-2 border-dashed border-amber-200">
                                        <p className="text-amber-800 font-bold mb-4 uppercase text-xs">Carica le tue foto della processione</p>
                                        <input type="file" multiple className="block w-full text-sm text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-stone-900 file:text-amber-500 hover:file:bg-stone-800" />
                                    </div>
                                ) : (
                                    <div className="bg-stone-200 p-8 rounded-3xl text-stone-500 italic">
                                        Devi essere iscritto per caricare o vedere le foto della squadra.
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="p-8 bg-stone-950 text-center">
                        <p className="text-stone-600 text-[10px] font-bold uppercase tracking-[0.2em]">© 2026 Vigili del Fuoco Savona</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
