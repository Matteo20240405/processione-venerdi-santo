<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processione VVF Savona</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBEfowaPh1GL3Rn4mgHTtvVA1mTac1y1JA", 
            authDomain: "processione-venerdi-santo.firebaseapp.com",
            projectId: "processione-venerdi-santo",
            storageBucket: "processione-venerdi-santo.firebasestorage.app",
            messagingSenderId: "236869792869",
            appId: "1:236869792869:web:22fe40a476af9d3530c28c"
        };

        const app = initializeApp(firebaseConfig);
        window.fb = { 
            db: getFirestore(app), auth: getAuth(app), 
            collection, addDoc, onSnapshot, query, orderBy, doc, getDoc, setDoc, deleteDoc, signInAnonymously, onAuthStateChanged,
            appPath: "venerdi-santo-2026" 
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f4; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d97706; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('home');
            const [user, setUser] = useState(null);
            const [participants, setParticipants] = useState([]);
            const [gallery, setGallery] = useState([]);
            const [isRegistered, setIsRegistered] = useState(false);
            const [loading, setLoading] = useState(false);
            const [selectedImg, setSelectedImg] = useState(null);
            const [mainImage, setMainImage] = useState("https://www.processione.savona.it/images/casse/18.jpg");
            const [isAdmin, setIsAdmin] = useState(false);

            useEffect(() => {
                const init = setInterval(() => {
                    if (window.fb) {
                        window.fb.signInAnonymously(window.fb.auth);
                        window.fb.onAuthStateChanged(window.fb.auth, u => {
                            setUser(u);
                            if (u) loadData(u.uid);
                        });
                        clearInterval(init);
                    }
                }, 500);
            }, []);

            const loadData = async (uid) => {
                const { db, collection, onSnapshot, query, orderBy, doc, appPath } = window.fb;
                
                // Immagine Home
                onSnapshot(doc(db, 'artifacts', appPath, 'public', 'data', 'settings', 'cassa'), (d) => {
                    if (d.exists() && d.data().url) setMainImage(d.data().url);
                });

                // Portatori
                onSnapshot(collection(db, 'artifacts', appPath, 'public', 'data', 'participants'), (s) => {
                    const list = s.docs.map(d => ({id: d.id, ...d.data()}));
                    setParticipants(list);
                    setIsRegistered(list.some(p => p.userId === uid));
                });

                // Galleria
                onSnapshot(query(collection(db, 'artifacts', appPath, 'public', 'data', 'gallery'), orderBy('timestamp', 'desc')), (s) => {
                    setGallery(s.docs.map(d => ({id: d.id, ...d.data()})));
                });
            };

            const toggleAdmin = () => {
                if (isAdmin) { setIsAdmin(false); setView('home'); } 
                else {
                    const pass = prompt("Inserisci Password Admin:");
                    if (pass === "115") setIsAdmin(true);
                    else alert("Password errata");
                }
            };

            const changeMainImage = async () => {
                const url = prompt("Incolla il link della nuova immagine per la Home:", mainImage);
                if (!url) return;
                const { db, doc, setDoc, appPath } = window.fb;
                await setDoc(doc(db, 'artifacts', appPath, 'public', 'data', 'settings', 'cassa'), { url });
            };

            const deleteItem = async (col, id) => {
                if (!confirm("Confermi l'eliminazione?")) return;
                const { db, doc, deleteDoc, appPath } = window.fb;
                await deleteDoc(doc(db, 'artifacts', appPath, 'public', 'data', col, id));
            };

            const handleUpload = async (e) => {
                const files = Array.from(e.target.files);
                setLoading(true);
                const { db, collection, addDoc, appPath } = window.fb;
                for (let file of files) {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = async (ev) => {
                        await addDoc(collection(db, 'artifacts', appPath, 'public', 'data', 'gallery'), {
                            url: ev.target.result, userId: user.uid, timestamp: Date.now()
                        });
                    };
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-stone-950 text-white p-4 shadow-xl sticky top-0 z-50 border-b border-amber-900/50 flex justify-between items-center">
                        <h1 className="text-lg font-serif font-bold text-amber-500">VVF Savona</h1>
                        <div className="flex gap-4 text-[10px] font-bold uppercase tracking-widest">
                            <button onClick={() => setView('home')}>Home</button>
                            <button onClick={() => setView('iscrizione')}>Iscrizione</button>
                            <button onClick={() => setView('galleria')}>Galleria</button>
                            <button onClick={toggleAdmin} className={isAdmin ? "text-red-500" : "text-stone-500"}>{isAdmin ? 'Esci' : 'Admin'}</button>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto p-4 w-full flex-grow">
                        {view === 'home' && (
                            <div className="space-y-6">
                                <div className="relative h-64 md:h-96 rounded-[2rem] overflow-hidden shadow-2xl">
                                    <img src={mainImage} className="w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/90 p-8 flex flex-col justify-end">
                                        <h2 className="text-3xl font-serif text-white uppercase">L'Orazione nell'orto</h2>
                                        {isAdmin && <button onClick={changeMainImage} className="text-[10px] bg-white/20 text-white p-2 rounded mt-2 uppercase">Cambia Foto Home</button>}
                                    </div>
                                </div>
                                <div className="bg-stone-900 text-white p-6 rounded-3xl shadow-xl border-t-4 border-red-700">
                                    <h3 className="text-amber-500 font-serif text-xl mb-4 uppercase tracking-tighter">Squadra Portatori ({participants.length})</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2 max-h-64 overflow-y-auto custom-scrollbar">
                                        {participants.map((p) => (
                                            <div key={p.id} className="text-xs py-2 border-b border-stone-800 text-stone-300 flex justify-between items-center italic">
                                                <span>• {p.nomeCognome}</span>
                                                {isAdmin && <button onClick={() => deleteItem('participants', p.id)} className="text-red-500 font-bold ml-2 underline">Elimina</button>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'iscrizione' && (
                            <div className="max-w-md mx-auto bg-white p-8 rounded-[2rem] shadow-2xl mt-10">
                                {isRegistered ? <p className="text-center font-bold text-green-600">Sei già iscritto! ✓</p> : (
                                    <form onSubmit={async (e) => {
                                        e.preventDefault();
                                        await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', window.fb.appPath, 'public', 'data', 'participants'), {
                                            nomeCognome: e.target.nome.value, userId: user.uid, timestamp: Date.now()
                                        });
                                        setView('home');
                                    }} className="space-y-4">
                                        <h2 className="text-2xl font-serif text-center">Registro Portatori</h2>
                                        <input name="nome" type="text" placeholder="Nome e Cognome" required className="w-full p-4 bg-stone-100 rounded-xl" />
                                        <button type="submit" className="w-full bg-stone-950 text-amber-500 py-4 rounded-xl font-black uppercase tracking-widest shadow-xl">Iscriviti</button>
                                    </form>
                                )}
                            </div>
                        )}

                        {view === 'galleria' && (
                            <div className="space-y-8">
                                <h2 className="text-3xl font-serif text-center">Galleria Foto</h2>
                                {(isRegistered || isAdmin) && (
                                    <div className="bg-white p-6 rounded-3xl border-2 border-dashed border-amber-200 text-center max-w-sm mx-auto shadow-sm">
                                        <input type="file" multiple accept="image/*" onChange={handleUpload} className="hidden" id="file-upload" />
                                        <label htmlFor="file-upload" className="cursor-pointer text-amber-800 font-bold uppercase text-[10px] tracking-widest">
                                            {loading ? 'Caricamento...' : '📸 Aggiungi Foto'}
                                        </label>
                                    </div>
                                )}
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {gallery.map(img => (
                                        <div key={img.id} className="relative aspect-square rounded-2xl overflow-hidden shadow-lg border-2 border-white group">
                                            <img src={img.url} onClick={() => setSelectedImg(img.url)} className="w-full h-full object-cover cursor-pointer" />
                                            {(isAdmin || (user && img.userId === user.uid)) && (
                                                <button onClick={() => deleteItem('gallery', img.id)} className="absolute top-2 right-2 bg-red-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-opacity">&times;</button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {selectedImg && (
                        <div className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-4" onClick={() => setSelectedImg(null)}>
                            <button className="absolute top-6 right-6 text-white text-4xl">&times;</button>
                            <img src={selectedImg} className="max-w-full max-h-full object-contain rounded-lg shadow-2xl" />
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
